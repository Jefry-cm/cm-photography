<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Photography</title>
    <link rel="icon" type="image/png" href="imagenes/LOGOO.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="opiniones.css">
</head>

<body>

<header>
  <div class="logo">
    <span class="cine">CM</span>
    <span class="grid">PHOTOGRAPHY</span>
  </div>

  <nav>
    <a href="Quiensoy.html">Quien Soy</a>
    <a href="Planes.html">Planes</a>
    <a href="Catalogo.html">Catálogo</a>
    <a href="opiniones.html">Opiniones</a>
  </nav>
</header>

<!-- CONTENEDOR CENTRADO -->
<div class="form-container">

  <section class="form-section">
    <h2>Hable sobre su experiencia</h2>

    <form class="form-grid">

      <!-- Datos personales -->
      <input type="text" placeholder="Primer nombre">
      <input type="text" placeholder="Segundo nombre">

      <input type="text" placeholder="Primer apellido">
      <input type="text" placeholder="Segundo apellido">

      <select>
        <option>Sexo</option>
        <option>Masculino</option>
        <option>Femenino</option>
      </select>

      <input type="date">

      <!-- Ubicación -->
      <input type="text" placeholder="Ciudad de nacimiento">

      <select>
        <option>Provincia</option>
        <option>Azua</option>
        <option>Santo Domingo</option>
        <option>Santiago</option>
      </select>

      <!-- Contacto -->
      <input type="tel" placeholder="Número de celular">
      <input type="tel" placeholder="Teléfono del trabajo">

      <input type="email" placeholder="Correo electrónico" class="full-width">

      <!-- Servicio -->
      <select class="full-width">
        <option>Basic</option>
        <option>Standar</option>
        <option>Premium</option>
      </select>

      <!-- Subir imagen -->
      <input type="file" class="full-width">

      <!-- Observaciones -->
      <textarea placeholder="Observaciones" class="full-width"></textarea>

      <!-- Botones -->
      <div class="buttons full-width">
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
      </div>

    </form>
  </section>

</div>

<footer class="footer">

  <div class="footer-container">

    <div class="footer-logo">
      <h3>CM <span>PHOTOGRAPHY</span></h3>
      <p>Capturando momentos únicos</p>
    </div>

    <div class="footer-links">
      <a href="Quiensoy.html">Inicio</a>
      <a href="Planes.html">Planes</a>
      <a href="Catalogo.html">Catálogo</a>
      <a href="opiniones.html">Opiniones</a>
    </div>

    <div class="footer-social">
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">WhatsApp</a>
    </div>

  </div>

  <p class="copy">© 2026 CM Photography - Todos los derechos reservados</p>

</footer>

</body>
</html>
